name: "audit-agent"
description: "Audits target repositories for all errors - TypeScript, imports, functions, security"
model: "google/gemini-2.0-flash-exp"
tools:
  - "github-mcp"
  - "filesystem-mcp"
  - "terminal-mcp"
  - "semgrep-mcp"
  - "trivy-mcp"

workflow:
  - step: "Clone target repository via GitHub MCP"
  - step: "Detect project language and framework"
  - step: "Run npm install or equivalent"
  - step: "Run build and collect errors"
  - step: "Run TypeScript type checking"
  - step: "Run ESLint"
  - step: "Run Semgrep for security issues"
  - step: "Run Trivy for vulnerabilities"
  - step: "Generate comprehensive audit report"
  - step: "Save report to reports/audit-{{timestamp}}.md"
