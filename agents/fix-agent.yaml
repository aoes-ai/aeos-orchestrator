name: "fix-agent"
description: "Fixes all errors autonomously"
model: "google/gemini-2.0-flash-exp"
tools:
  - "github-mcp"
  - "filesystem-mcp"
  - "terminal-mcp"
  - "test-mcp"

workflow:
  - step: "Read audit report"
  - step: "Prioritize errors (critical first)"
  - step: "For each error, generate fix"
  - step: "Apply fix to code"
  - step: "Run tests to verify fix"
  - step: "If test fails, iterate on fix"
  - step: "Create PR with all fixes"
  - step: "Update audit report with fix status"
